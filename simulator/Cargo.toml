[package]
name = "simulator"
version = "0.1.0"
authors = ["njona <n.jonathan.jiang@gmail.com>"]
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
[dev-dependencies]

[profile.wasm]
inherits = "release"

opt-level = "s" # Small code size
lto = true      # Link-time stripping of unused functions
incremental = true
panic = "abort" # Don't include heavy code for handling panics

# For autogenerating definitions. These will be stripped out in the final output by another pass
strip = "none"  # Need these for better TypeScript definition generation
debug = true    # Need these for better TypeScript definition generation